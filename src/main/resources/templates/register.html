<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên - FU Car Rental</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="light-theme" style="margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background-color: var(--bg-primary);">

    <div style="max-width: 680px; width: 90%; margin: 2rem 0; padding: 2.5rem; background-color: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg), var(--shadow-inset);">
        <div style="margin-bottom: 2rem; text-align: center;">
            <a href="/" class="brand-logo" style="justify-content: center; margin-bottom: 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#10b981"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
                FU Car Rental
            </a>
            <h3 style="font-size: 1.75rem; margin-bottom: 0.25rem;">Đăng ký tài khoản</h3>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Đăng ký thông tin thuê xe nhanh chóng chỉ với vài bước</p>
        </div>

        <!-- Alert messages -->
        <div th:if="${error}" class="alert alert-danger">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span th:text="${error}">Đăng ký thất bại</span>
        </div>

        <form th:action="@{/register}" method="POST">
            <!-- Part 1: Account credentials -->
            <h4 style="font-size: 1.1rem; color: var(--accent); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Tài khoản đăng nhập
            </h4>
            
            <div class="form-row cols-3">
                <div class="form-group">
                    <label for="name" class="form-label">Tên tài khoản</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="username123" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Địa chỉ Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="yourname@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Part 2: Personal Details -->
            <h4 style="font-size: 1.1rem; color: var(--accent); margin-top: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                Thông tin khách hàng
            </h4>
            
            <div class="form-row cols-2">
                <div class="form-group">
                    <label for="fullName" class="form-label">Họ và Tên</label>
                    <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Nguyễn Văn A" pattern="^[a-zA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂÂÊÔƠưăâêôơẤẦẨẪẬẮẰẲẴẶẸẺẼỀỀỂỄỆÍÌỈĨỊỐỒỔỖỘỚỜỞỠỢỤỦŨỨỪỬỮỰỲÝỶỸỴỳýỷỹỵaàáảãạăằắẳẵặâầấẩẫậeèéẻẽẹêềếểễệiìíỉĩịoòóỏõọôồốổỗộơờớởỡợuùúủũụưừứửữựyỳýỷỹỵAÀÁẢÃẠĂẰẮẲẴẶÂẦẤẨẪẬEÈÉẺẼẸÊỀẾỂỄỆIÌÍỈĨỊOÒÓỎỖỘƠỜỚỞỠỢUÙÚỦŨỤƯỪỨỬỮỰYỲÝỶỸỴĐđ\s]+$" title="Họ và tên chỉ được chứa chữ cái và khoảng trắng, không chứa số hoặc ký tự đặc biệt" required>
                </div>
                <div class="form-group">
                    <label for="mobile" class="form-label">Số điện thoại</label>
                    <input type="text" id="mobile" name="mobile" class="form-control" placeholder="0987654321" pattern="\d{10}" minlength="10" maxlength="10" title="Số điện thoại phải bao gồm đúng 10 chữ số" required>
                </div>
            </div>
            
            <div class="form-row cols-2">
                <div class="form-group">
                    <label for="birthday" class="form-label">Ngày sinh</label>
                    <input type="date" id="birthday" name="birthday" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="identityCard" class="form-label">Số CMND / CCCD</label>
                    <input type="text" id="identityCard" name="identityCard" class="form-control" placeholder="012345678912" pattern="\d+" title="Số CMND/CCCD chỉ được chứa chữ số" required>
                </div>
            </div>

            <div class="form-row cols-2">
                <div class="form-group">
                    <label for="licenceNumber" class="form-label">Số bằng lái xe</label>
                    <input type="text" id="licenceNumber" name="licenceNumber" class="form-control" placeholder="G1234567" required>
                </div>
                <div class="form-group">
                    <label for="licenceDate" class="form-label">Ngày cấp bằng</label>
                    <input type="date" id="licenceDate" name="licenceDate" class="form-control" required>
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; font-weight: 600;">Đăng ký thành viên</button>
            </div>
            
            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                Đã có tài khoản? 
                <a th:href="@{/login}" style="color: var(--accent); font-weight: 500; text-decoration: underline;">Đăng nhập ngay</a>
            </div>
        </form>
    </div>
</body>
</html>
