<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - FU Car Rental</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="light-theme" style="margin:0; padding:0;">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--bg-primary); padding: 2rem 1.5rem;">
        <div style="max-width: 480px; width: 100%; display: flex; flex-direction: column; gap: 1.75rem;">
            
            <!-- Brand Logo centered at the top -->
            <a href="/" class="brand-logo" style="font-size: 2rem; justify-content: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#10b981"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
                FU Car Rental
            </a>
            
            <!-- Login Form Card in the center -->
            <div class="auth-form-card" style="margin: 0; padding: 2.5rem; background-color: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg), var(--shadow-inset);">
                
                <!-- Alert Messages -->
                <div th:if="${error}" class="alert alert-danger" style="padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span th:text="${error}">Mật khẩu không đúng</span>
                </div>
                <div th:if="${success}" class="alert alert-success" style="padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span th:text="${success}">Đăng ký thành công</span>
                </div>

                <form th:action="@{/login}" method="POST">
                    <div class="form-group">
                        <label for="email" class="form-label">Địa chỉ Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="username@domain.com" required autocomplete="email">
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 1.75rem;">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; font-weight: 600;">Đăng nhập</button>
                </form>
                
                <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                    Chưa có tài khoản? 
                    <a th:href="@{/register}" style="color: var(--accent); font-weight: 500; text-decoration: underline;">Đăng ký ngay</a>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
