spring.application.name=SE2034-JV_LinhNHHE194585_CarRentingSystem

# Port configuration
server.port=8080

# Thymeleaf configuration
spring.thymeleaf.cache=false

# Microsoft SQL Server Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FUCarRentingSystem_DB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
